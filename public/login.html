<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pulse — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f0f2f7;--primary:#3b7ef8;--primary-d:#e8edf8;
  --text:#1a1f2e;--text-m:#5a6072;--text-s:#9aa0b0;
  --card:#ffffff;--border:#e5e7eb;--green:#10b981;
  --red:#ef4444;--sidebar:#151e35;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
.login-shell{display:flex;height:100vh}
.login-left{
  width:400px;background:var(--sidebar);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;color:#fff;flex-shrink:0;
}
@media(max-width:800px){.login-left{display:none}}
.login-logo{
  width:64px;height:64px;border-radius:16px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;color:#fff;margin-bottom:20px;
}
.login-brand{font-size:28px;font-weight:700;margin-bottom:6px}
.login-tagline{font-size:13px;color:rgba(255,255,255,.45);text-align:center;line-height:1.5}
.login-right{
  flex:1;display:flex;align-items:center;justify-content:center;padding:40px;
}
.login-card{
  background:var(--card);border-radius:18px;padding:36px;
  width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.08);
  border:1px solid var(--border);
}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text-s);margin-bottom:24px}
.login-tabs{display:flex;gap:4px;margin-bottom:24px}
.login-tab{
  flex:1;padding:8px;text-align:center;border-radius:8px;
  font-size:12px;font-weight:600;cursor:pointer;
  background:var(--bg);color:var(--text-m);border:1.5px solid var(--border);
  transition:all .15s;
}
.login-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.login-tab:hover:not(.active){border-color:var(--primary);color:var(--primary)}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-m);margin-bottom:5px}
.field input{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;outline:none;transition:border-color .2s;font-family:inherit;
}
.field input:focus{border-color:var(--primary)}
.login-btn{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:var(--primary);color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;transition:opacity .2s;font-family:inherit;margin-top:8px;
}
.login-btn:hover{opacity:.88}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{
  margin-top:12px;padding:10px 12px;border-radius:8px;
  background:#fef2f2;border:1px solid #fecaca;
  font-size:12px;color:var(--red);display:none;
}
.login-success{
  margin-top:12px;padding:10px 12px;border-radius:8px;
  background:#ecfdf5;border:1px solid #a7f3d0;
  font-size:12px;color:var(--green);display:none;
}
.field-name{display:none}
</style>
</head>
<body>
<div class="login-shell">
  <div class="login-left">
    <div class="login-logo">P</div>
    <div class="login-brand">Pulse</div>
    <div class="login-tagline">KOL Team Dashboard<br/>Organize your marketing team's<br/>daily activities by brand</div>
  </div>
  <div class="login-right">
    <div class="login-card">
      <div class="login-title">Welcome</div>
      <div class="login-sub">Sign in to access your dashboard</div>
      <div class="login-tabs">
        <div class="login-tab active" onclick="switchTab('login')">Sign In</div>
        <div class="login-tab" onclick="switchTab('register')">Create Account</div>
      </div>
      <form id="auth-form" onsubmit="handleSubmit(event)">
        <div class="field field-name">
          <label>Name</label>
          <input type="text" id="f-name" placeholder="Your name"/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="you@example.com" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="f-password" placeholder="Min. 6 characters" required minlength="6"/>
        </div>
        <button type="submit" class="login-btn" id="submit-btn">Sign In</button>
      </form>
      <div class="login-error" id="error-msg"></div>
      <div class="login-success" id="success-msg"></div>
    </div>
  </div>
</div>
<script>
let mode = 'login';

// If already authenticated, go to dashboard
if (localStorage.getItem('pulse_token')) {
  window.location.href = '/dashboard';
}

function switchTab(tab) {
  mode = tab;
  document.querySelectorAll('.login-tab').forEach(function(t, i) {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  document.querySelector('.field-name').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('submit-btn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Loading...';

  const email = document.getElementById('f-email').value;
  const password = document.getElementById('f-password').value;
  const name = document.getElementById('f-name').value;

  const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
  const body = mode === 'login' ? { email, password } : { name, email, password };

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || 'Something went wrong';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = mode === 'login' ? 'Sign In' : 'Create Account';
      return;
    }

    localStorage.setItem('pulse_token', data.token);
    localStorage.setItem('pulse_user', JSON.stringify(data.user));

    if (mode === 'register') {
      sucEl.textContent = 'Account created! Redirecting...';
      sucEl.style.display = 'block';
    }

    setTimeout(function() {
      window.location.href = '/dashboard';
    }, mode === 'register' ? 800 : 0);
  } catch (err) {
    errEl.textContent = 'Connection error. Is the server running?';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  }
}
</script>
</body>
</html>
